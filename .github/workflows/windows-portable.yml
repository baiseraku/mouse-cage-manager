name: Build Windows Portable EXE

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows portable exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build portable exe
        run: npm run tauri:build:portable

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: mouse-cage-manager-windows-portable
          path: src-tauri/target/release/mouse-cage-manager.exe
          if-no-files-found: error
